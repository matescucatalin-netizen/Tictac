<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exchange Display</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:#fff;
font-family:Oswald;
}

/* STRUCTURA PRINCIPALĂ */
.shell{
display:grid;
grid-template-rows: 14vh 6vh 1fr 6vh;
height:100vh;
}

/* HEADER */
.header{
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:0 3vw;
border-bottom:3px solid #e9ecef;
}

.brand{
font-family:'Bebas Neue';
font-size:5.5vh;
line-height:1;
}

.brand span{color:#a37a00}

.sub{
font-size:1.2vh;
opacity:.5;
letter-spacing:.25em;
text-transform:uppercase;
}

.center{
text-align:center;
font-size:3vh;
font-weight:700;
}

.clock{
text-align:right;
font-family:'Bebas Neue';
font-size:6.5vh;
}

/* HEADER TABLE TITLES FIX */
.head{
display:grid;
grid-template-columns:2.6fr 1fr 1fr;
align-items:center;
padding:0 2vw;
background:#f6f7f9;
font-size:1.5vh;
font-weight:700;
letter-spacing:.2em;
text-transform:uppercase;
}

/* TABLE AREA FIX */
.table{
display:grid;
grid-template-rows: repeat(10, 1fr);
height:100%;
}

/* ROW FIXED ALIGNMENT */
.row{
display:grid;
grid-template-columns:2.6fr 1fr 1fr;
align-items:center;
padding:0 2vw;
border-bottom:1px solid #eee;
height:100%;
}

/* alternare culori */
.row:nth-child(even){
background:#fafafa;
}

/* highlight EUR/USD */
.hero{
background:#fff7e2 !important;
border-left:6px solid #a37a00;
}

/* CURRENCY */
.currency{
display:flex;
align-items:center;
gap:1.2vw;
}

.flag{
width:6vh;
height:4vh;
border-radius:4px;
}

.code{
font-size:3.4vh;
font-weight:800;
}

.name{
font-size:2.2vh;
opacity:.6;
margin-left:0.6vw;
}

/* RATE */
.rate{
font-family:'Bebas Neue';
font-size:7.5vh;
text-align:center;
}

.buy{color:#1a7a3a}
.sell{color:#b3261e}

/* FOOTER TICKER */
.footer{
background:#111;
color:#fff;
overflow:hidden;
display:flex;
align-items:center;
}

.ticker{
white-space:nowrap;
padding-left:100%;
animation:move 20s linear infinite;
font-size:2vh;
letter-spacing:.15em;
}

@keyframes move{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}
</style>
</head>

<body>

<div class="shell">

<!-- HEADER -->
<div class="header">
<div>
<div class="brand">SERMIRAV <span>EXCHANGE</span></div>
<div class="sub">Schimb Valutar • Display TV</div>
</div>

<div class="center" id="weather">🌤️ --°C</div>

<div class="clock" id="clock">--:--</div>
</div>

<!-- TABLE HEADER -->
<div class="head">
<div>Valută</div>
<div>Cumpărăm</div>
<div>Vindem</div>
</div>

<!-- TABLE -->
<div class="table" id="table"></div>

<!-- FOOTER -->
<div class="footer">
<div class="ticker">
✓ CURSURI NEGOCIABILE • ✓ MONEYGRAM • ✓ BIJUTERII • ✓ AMANET • ✓ CUMPĂRĂM AUR •
</div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>

firebase.initializeApp({
databaseURL:"https://sermirav-exchange-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = firebase.database();
const PATH = "tictac/rates";

const currencies=[
{c:"EUR",n:"Euro",f:"https://flagcdn.com/eu.svg"},
{c:"USD",n:"Dolar",f:"https://flagcdn.com/us.svg"},
{c:"GBP",n:"Liră",f:"https://flagcdn.com/gb.svg"},
{c:"CHF",n:"Franc",f:"https://flagcdn.com/ch.svg"},
{c:"CAD",n:"CAD",f:"https://flagcdn.com/ca.svg"},
{c:"AUD",n:"AUD",f:"https://flagcdn.com/au.svg"},
{c:"PLN",n:"PLN",f:"https://flagcdn.com/pl.svg"},
{c:"TRY",n:"TRY",f:"https://flagcdn.com/tr.svg"},
{c:"HUF",n:"HUF",f:"https://flagcdn.com/hu.svg"},
{c:"BGN",n:"BGN",f:"https://flagcdn.com/bg.svg"}
];

const DEF={
EUR:{buy:4.97,sell:5.05},
USD:{buy:4.33,sell:4.45},
GBP:{buy:5.82,sell:6.03},
CHF:{buy:5.59,sell:5.71},
CAD:{buy:3.07,sell:3.30},
AUD:{buy:2.76,sell:3.10},
PLN:{buy:1.14,sell:1.22},
TRY:{buy:0.095,sell:0.119},
HUF:{buy:0.013,sell:0.0141},
BGN:{buy:2.25,sell:2.66}
};

let rates={...DEF};

function fmt(v){
return (v===null||v===undefined)?"—":Number(v).toFixed(2);
}

/* RENDER STABIL */
function render(){
const el=document.getElementById("table");
el.innerHTML="";

currencies.forEach(x=>{
const r=rates[x.c]||{};
const hero=(x.c==="EUR"||x.c==="USD");

el.innerHTML+=`
<div class="row ${hero?"hero":""}">
  <div class="currency">
    <img class="flag" src="${x.f}">
    <div class="code">${x.c} <span class="name">${x.n}</span></div>
  </div>
  <div class="rate buy">${fmt(r.buy)}</div>
  <div class="rate sell">${fmt(r.sell)}</div>
</div>`;
});
}

/* FIREBASE SAFE */
db.ref(PATH).on("value",snap=>{
const d=snap.val();
if(d) rates=d;
render();
});

/* CLOCK */
function clock(){
const d=new Date();
document.getElementById("clock").innerText=
String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
setInterval(clock,1000);
clock();

/* WEATHER */
async function weather(){
try{
const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.1&longitude=24.37&current=temperature_2m");
const d=await r.json();
document.getElementById("weather").innerText="🌤️ "+Math.round(d.current.temperature_2m)+"°C";
}catch(e){}
}
weather();

</script>

</body>
</html>
