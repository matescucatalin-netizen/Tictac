<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Exchange</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --bg2: #0d1117;
    --panel: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.06);
    --gold: #c9a84c;
    --gold2: #f0c96e;
    --silver: #8ab4d4;
    --green: #00e5a0;
    --red: #ff4d6d;
    --white: #f0f4f8;
    --dim: rgba(240,244,248,0.45);
    --accent: #1e3a5f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* Subtle animated background grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(30,58,95,0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,58,95,0.15) 1px, transparent 1px);
    background-size: 80px 80px;
    animation: gridShift 60s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(201,168,76,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridShift {
    0% { background-position: 0 0; }
    100% { background-position: 80px 80px; }
  }

  /* LAYOUT */
  .wrapper {
    position: relative;
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    z-index: 1;
    padding: 32px 48px 0;
    gap: 0;
  }

  /* TOP BAR */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .logo-icon {
    width: 64px; height: 64px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .logo-icon::before {
    content: '';
    position: absolute; inset: 0;
    background: conic-gradient(from 0deg, transparent 0%, var(--gold) 25%, transparent 50%);
    animation: spinRing 4s linear infinite;
    opacity: 0.3;
  }

  @keyframes spinRing {
    to { transform: rotate(360deg); }
  }

  .logo-icon svg {
    position: relative; z-index: 1;
    width: 32px; height: 32px;
    fill: var(--gold);
  }

  .logo-text {
    line-height: 1;
  }

  .logo-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.2rem;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, var(--gold2) 0%, var(--gold) 60%, #a07830 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-sub {
    font-size: 0.85rem;
    letter-spacing: 0.35em;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .top-right {
    display: flex;
    align-items: center;
    gap: 48px;
  }

  /* WEATHER */
  .weather-widget {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 24px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .weather-icon {
    font-size: 2rem;
    line-height: 1;
  }

  .weather-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .weather-temp {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.08em;
    color: var(--white);
    line-height: 1;
  }

  .weather-city {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .weather-desc {
    font-size: 0.8rem;
    color: rgba(240,244,248,0.6);
    letter-spacing: 0.05em;
  }

  /* CLOCK */
  .clock-widget {
    text-align: right;
  }

  .clock-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 3.8rem;
    line-height: 1;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--white) 0%, var(--dim) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .clock-date {
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* MAIN RATES AREA */
  .rates-area {
    display: flex;
    flex-direction: column;
    gap: 18px;
    align-items: stretch;
    justify-content: center;
  }

  /* Currency row */
  .currency-row {
    display: grid;
    grid-template-columns: 280px 1fr 1fr;
    align-items: center;
    gap: 0;
    padding: 0 0;
    position: relative;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.6s ease forwards;
  }

  .currency-row:nth-child(1) { animation-delay: 0.1s; }
  .currency-row:nth-child(2) { animation-delay: 0.2s; }
  .currency-row:nth-child(3) { animation-delay: 0.3s; }
  .currency-row:nth-child(4) { animation-delay: 0.4s; }
  .currency-row:nth-child(5) { animation-delay: 0.5s; }
  .currency-row:nth-child(6) { animation-delay: 0.6s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Separator line between rows */
  .currency-row + .currency-row::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
  }

  /* Currency identity */
  .currency-id {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 22px 0;
  }

  .flag {
    font-size: 2.8rem;
    line-height: 1;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }

  .currency-meta {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .currency-code {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 0.1em;
    line-height: 1;
    color: var(--white);
  }

  .currency-name {
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* Rate cells */
  .rate-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 18px 24px;
    position: relative;
  }

  .rate-cell.buy {
    background: linear-gradient(135deg, rgba(0,229,160,0.05) 0%, transparent 60%);
    border-left: 1px solid rgba(0,229,160,0.12);
  }

  .rate-cell.sell {
    background: linear-gradient(135deg, rgba(255,77,109,0.05) 0%, transparent 60%);
    border-left: 1px solid rgba(255,77,109,0.12);
  }

  .rate-label {
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .rate-cell.buy .rate-label { color: var(--green); }
  .rate-cell.sell .rate-label { color: var(--red); }

  .rate-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4.2rem;
    letter-spacing: 0.06em;
    line-height: 1;
    transition: color 0.4s;
  }

  .rate-cell.buy .rate-value { color: var(--white); }
  .rate-cell.sell .rate-value { color: var(--white); }

  .rate-unit {
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    color: var(--dim);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* Gold row special */
  .currency-row.gold-row .currency-code {
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .currency-row.gold-row .rate-value {
    font-size: 3.4rem;
  }

  /* BOTTOM TICKER */
  .bottom-ticker {
    position: relative;
    border-top: 1px solid var(--border);
    margin-top: 8px;
    background: rgba(201,168,76,0.04);
    overflow: hidden;
    height: 52px;
    display: flex;
    align-items: center;
  }

  .ticker-label {
    position: absolute;
    left: 0;
    z-index: 10;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    padding: 0 28px;
    height: 100%;
    display: flex;
    align-items: center;
    white-space: nowrap;
  }

  .ticker-label::after {
    content: '';
    position: absolute;
    right: -20px; top: 0;
    width: 20px; height: 100%;
    background: linear-gradient(90deg, var(--gold2), transparent);
    opacity: 0.3;
  }

  .ticker-track {
    display: flex;
    align-items: center;
    white-space: nowrap;
    animation: ticker 35s linear infinite;
    margin-left: 240px;
    gap: 0;
  }

  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 40px;
    font-size: 0.9rem;
    letter-spacing: 0.12em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .ticker-item strong {
    color: var(--white);
    font-size: 1rem;
    font-weight: 700;
  }

  .ticker-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.5;
    margin: 0 16px;
  }

  /* Header labels row */
  .header-row {
    display: grid;
    grid-template-columns: 280px 1fr 1fr;
    padding-bottom: 8px;
    margin-bottom: 4px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }

  .header-cell {
    text-align: center;
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    padding: 0 24px;
  }

  .header-cell:first-child { text-align: left; }

  /* Pulse dot for live */
  .live-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: var(--green);
    text-transform: uppercase;
  }

  .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(0,229,160,0.4);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(0,229,160,0.5); }
    70% { box-shadow: 0 0 0 10px rgba(0,229,160,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,229,160,0); }
  }

  /* ADMIN OVERLAY */
  .admin-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(12px);
  }

  .admin-overlay.active { display: flex; }

  .admin-panel {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px;
    width: 680px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
  }

  .admin-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .admin-sub {
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .admin-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 28px;
  }

  .admin-item {
    display: grid;
    grid-template-columns: 160px 1fr 1fr;
    gap: 12px;
    align-items: center;
  }

  .admin-currency-label {
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .admin-currency-label .flag { font-size: 1.4rem; }

  .admin-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--white);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.1rem;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .admin-input:focus {
    border-color: var(--gold);
    background: rgba(201,168,76,0.05);
  }

  .admin-col-label {
    text-align: center;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--dim);
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .admin-headers {
    display: grid;
    grid-template-columns: 160px 1fr 1fr;
    gap: 12px;
    margin-bottom: 8px;
  }

  .admin-buttons {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }

  .btn {
    flex: 1;
    padding: 14px 24px;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-save {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    color: #000;
  }

  .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }

  .btn-cancel {
    background: rgba(255,255,255,0.06);
    color: var(--dim);
    border: 1px solid var(--border);
  }

  .btn-cancel:hover { background: rgba(255,255,255,0.1); }

  /* PIN overlay */
  .pin-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 999;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(16px);
  }

  .pin-overlay.active { display: flex; }

  .pin-box {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px;
    text-align: center;
    width: 360px;
  }

  .pin-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-bottom: 24px;
  }

  .pin-dots {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .pin-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    transition: all 0.2s;
  }

  .pin-dot.filled {
    background: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(201,168,76,0.4);
  }

  .pin-keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .pin-key {
    padding: 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .pin-key:hover { background: rgba(201,168,76,0.15); border-color: var(--gold); }
  .pin-key:active { transform: scale(0.95); }

  .pin-key.clear {
    background: rgba(255,77,109,0.1);
    border-color: rgba(255,77,109,0.2);
    color: var(--red);
    font-size: 1rem;
    letter-spacing: 0.2em;
  }

  .pin-error {
    color: var(--red);
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 16px;
    min-height: 20px;
    transition: opacity 0.3s;
  }

  .pin-close-hint {
    font-size: 0.72rem;
    color: var(--dim);
    margin-top: 20px;
    letter-spacing: 0.15em;
  }

  /* shimmer on rate update */
  @keyframes shimmer {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
  }

  .updating { animation: shimmer 0.4s ease; }
</style>
</head>
<body>

<!-- PIN OVERLAY -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <div class="pin-title">🔐 Acces Admin</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-keypad">
      <div class="pin-key" onclick="enterPin('1')">1</div>
      <div class="pin-key" onclick="enterPin('2')">2</div>
      <div class="pin-key" onclick="enterPin('3')">3</div>
      <div class="pin-key" onclick="enterPin('4')">4</div>
      <div class="pin-key" onclick="enterPin('5')">5</div>
      <div class="pin-key" onclick="enterPin('6')">6</div>
      <div class="pin-key" onclick="enterPin('7')">7</div>
      <div class="pin-key" onclick="enterPin('8')">8</div>
      <div class="pin-key" onclick="enterPin('9')">9</div>
      <div class="pin-key clear" onclick="clearPin()">Șterge</div>
      <div class="pin-key" onclick="enterPin('0')">0</div>
      <div class="pin-key clear" onclick="closePinOverlay()">Ieșire</div>
    </div>
    <div class="pin-error" id="pinError"></div>
    <div class="pin-close-hint">Apasă oriunde în afara pentru a ieși</div>
  </div>
</div>

<!-- ADMIN OVERLAY -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-panel">
    <div class="admin-title">⚙️ Tic Tac — Admin</div>
    <div class="admin-sub">Editează cursurile de schimb valutar</div>

    <div class="admin-headers">
      <div></div>
      <div class="admin-col-label">Cumpărăm</div>
      <div class="admin-col-label">Vindem</div>
    </div>

    <div class="admin-grid" id="adminGrid">
      <!-- populated by JS -->
    </div>

    <div class="admin-buttons">
      <button class="btn btn-save" onclick="saveRates()">💾 Salvează</button>
      <button class="btn btn-cancel" onclick="closeAdmin()">✕ Anulează</button>
    </div>
  </div>
</div>

<!-- MAIN DISPLAY -->
<div class="wrapper">
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">Tic Tac</div>
        <div class="logo-sub">Casa de Schimb Valutar</div>
      </div>
    </div>

    <div class="top-right">
      <div class="weather-widget" id="weatherWidget">
        <div class="weather-icon" id="weatherIcon">🌤️</div>
        <div class="weather-info">
          <div class="weather-temp" id="weatherTemp">—°C</div>
          <div class="weather-city">Râmnicu Vâlcea</div>
          <div class="weather-desc" id="weatherDesc">Se încarcă...</div>
        </div>
      </div>

      <div class="clock-widget">
        <div class="clock-time" id="clockTime">00:00:00</div>
        <div class="clock-date" id="clockDate">—</div>
      </div>
    </div>
  </div>

  <!-- RATES AREA -->
  <div class="rates-area" id="ratesArea">
    <!-- Header -->
    <div class="header-row">
      <div class="header-cell">
        <div class="live-indicator">
          <div class="pulse-dot"></div>
          Cursuri Live
        </div>
      </div>
      <div class="header-cell">Cumpărăm</div>
      <div class="header-cell">Vindem</div>
    </div>
    <!-- Rows populated by JS -->
  </div>

  <!-- BOTTOM TICKER -->
  <div class="bottom-ticker">
    <div class="ticker-label">Cursuri Negociabile</div>
    <div class="ticker-track" id="tickerTrack">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  // ── CONFIG ───────────────────────────────────────────────
  const FIREBASE_CONFIG = {
    databaseURL: 'https://sermirav-exchange-default-rtdb.europe-west1.firebasedatabase.app/'
  };
  const LOCATION_KEY = 'tictac';
  const ADMIN_PIN = '1234';
  const WEATHER_API = 'https://wttr.in/Ramnicu+Valcea?format=j1';

  const CURRENCIES = [
    { code: 'EUR', name: 'Euro', flag: '🇪🇺' },
    { code: 'USD', name: 'Dolar American', flag: '🇺🇸' },
    { code: 'GBP', name: 'Liră Sterlină', flag: '🇬🇧' },
    { code: 'CHF', name: 'Franc Elvețian', flag: '🇨🇭' },
    { code: 'MDL', name: 'Leu Moldovenesc', flag: '🇲🇩' },
    { code: 'XAU', name: 'Aur / gram 14k', flag: '🥇', gold: true },
  ];

  // ── FIREBASE ─────────────────────────────────────────────
  const app = initializeApp(FIREBASE_CONFIG);
  const db = getDatabase(app);

  let currentRates = {};

  function listenRates() {
    const rRef = ref(db, `locations/${LOCATION_KEY}/rates`);
    onValue(rRef, snap => {
      const data = snap.val() || {};
      currentRates = data;
      renderRates(data);
      updateTicker(data);
    });
  }

  function saveRatesToFirebase(rates) {
    return set(ref(db, `locations/${LOCATION_KEY}/rates`), rates);
  }

  // ── CLOCK ─────────────────────────────────────────────────
  const DAYS = ['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'];
  const MONTHS = ['Ian','Feb','Mar','Apr','Mai','Iun','Iul','Aug','Sep','Oct','Nov','Dec'];

  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clockTime').textContent = `${h}:${m}:${s}`;
    const day = DAYS[now.getDay()];
    const date = now.getDate();
    const month = MONTHS[now.getMonth()];
    const year = now.getFullYear();
    document.getElementById('clockDate').textContent = `${day}, ${date} ${month} ${year}`;
  }

  setInterval(updateClock, 1000);
  updateClock();

  // ── WEATHER ───────────────────────────────────────────────
  const weatherIcons = {
    sunny: '☀️', clear: '🌙', partlycloudy: '⛅', cloudy: '☁️',
    overcast: '☁️', mist: '🌫️', fog: '🌫️', rain: '🌧️',
    drizzle: '🌦️', snow: '❄️', sleet: '🌨️', thunder: '⛈️',
  };

  async function fetchWeather() {
    try {
      const r = await fetch(WEATHER_API);
      const d = await r.json();
      const curr = d.current_condition[0];
      const temp = curr.temp_C;
      const desc = curr.weatherDesc[0].value;
      document.getElementById('weatherTemp').textContent = `${temp}°C`;
      document.getElementById('weatherDesc').textContent = desc;

      const dl = desc.toLowerCase();
      let icon = '🌤️';
      for (const [k, v] of Object.entries(weatherIcons)) {
        if (dl.includes(k)) { icon = v; break; }
      }
      if (dl.includes('sunny') || dl.includes('clear')) icon = parseInt(temp) > 15 ? '☀️' : '🌙';
      if (dl.includes('thunder')) icon = '⛈️';
      if (dl.includes('rain')) icon = '🌧️';
      if (dl.includes('snow')) icon = '❄️';
      document.getElementById('weatherIcon').textContent = icon;
    } catch(e) {
      document.getElementById('weatherDesc').textContent = 'indisponibil';
    }
  }

  fetchWeather();
  setInterval(fetchWeather, 15 * 60 * 1000);

  // ── RENDER RATES ──────────────────────────────────────────
  function fmtRate(v) {
    if (!v && v !== 0) return '—';
    return parseFloat(v).toFixed(4);
  }

  function renderRates(data) {
    const area = document.getElementById('ratesArea');
    // Remove existing rows (keep header)
    const oldRows = area.querySelectorAll('.currency-row');
    oldRows.forEach(r => r.remove());

    CURRENCIES.forEach((cur, idx) => {
      const buy = data[cur.code]?.buy;
      const sell = data[cur.code]?.sell;

      const row = document.createElement('div');
      row.className = 'currency-row' + (cur.gold ? ' gold-row' : '');
      row.style.animationDelay = `${idx * 0.08}s`;
      row.innerHTML = `
        <div class="currency-id">
          <div class="flag">${cur.flag}</div>
          <div class="currency-meta">
            <div class="currency-code">${cur.code}</div>
            <div class="currency-name">${cur.name}</div>
          </div>
        </div>
        <div class="rate-cell buy">
          <div class="rate-label">Cumpărăm</div>
          <div class="rate-value" id="buy-${cur.code}">${fmtRate(buy)}</div>
          <div class="rate-unit">RON / 1 ${cur.code === 'XAU' ? 'gram' : cur.code}</div>
        </div>
        <div class="rate-cell sell">
          <div class="rate-label">Vindem</div>
          <div class="rate-value" id="sell-${cur.code}">${fmtRate(sell)}</div>
          <div class="rate-unit">RON / 1 ${cur.code === 'XAU' ? 'gram' : cur.code}</div>
        </div>
      `;
      area.appendChild(row);
    });
  }

  // ── TICKER ────────────────────────────────────────────────
  function updateTicker(data) {
    const track = document.getElementById('tickerTrack');
    let html = '';
    const items = CURRENCIES.map(cur => {
      const buy = data[cur.code]?.buy;
      const sell = data[cur.code]?.sell;
      if (!buy && !sell) return '';
      return `
        <span class="ticker-item">
          ${cur.flag} <strong>${cur.code}</strong>
          &nbsp;Cump: <strong>${fmtRate(buy)}</strong>
          &nbsp;·&nbsp;
          Vând: <strong>${fmtRate(sell)}</strong>
        </span>
        <span class="ticker-dot"></span>
      `;
    }).join('');
    // duplicate for seamless loop
    html = items + items;
    track.innerHTML = html;
  }

  // ── ADMIN PIN ─────────────────────────────────────────────
  let pinBuffer = '';

  window.enterPin = function(digit) {
    if (pinBuffer.length >= 4) return;
    pinBuffer += digit;
    updatePinDots();
    if (pinBuffer.length === 4) {
      setTimeout(() => {
        if (pinBuffer === ADMIN_PIN) {
          closePinOverlay();
          openAdmin();
        } else {
          document.getElementById('pinError').textContent = 'PIN incorect. Încearcă din nou.';
          setTimeout(() => {
            pinBuffer = '';
            updatePinDots();
            document.getElementById('pinError').textContent = '';
          }, 900);
        }
      }, 200);
    }
  };

  window.clearPin = function() {
    pinBuffer = pinBuffer.slice(0, -1);
    updatePinDots();
    document.getElementById('pinError').textContent = '';
  };

  function updatePinDots() {
    for (let i = 0; i < 4; i++) {
      document.getElementById(`d${i}`).classList.toggle('filled', i < pinBuffer.length);
    }
  }

  window.closePinOverlay = function() {
    document.getElementById('pinOverlay').classList.remove('active');
    pinBuffer = '';
    updatePinDots();
    document.getElementById('pinError').textContent = '';
  };

  function openPinOverlay() {
    document.getElementById('pinOverlay').classList.add('active');
  }

  // ── ADMIN PANEL ───────────────────────────────────────────
  function openAdmin() {
    const grid = document.getElementById('adminGrid');
    grid.innerHTML = '';
    CURRENCIES.forEach(cur => {
      const buy = currentRates[cur.code]?.buy || '';
      const sell = currentRates[cur.code]?.sell || '';
      const item = document.createElement('div');
      item.className = 'admin-item';
      item.innerHTML = `
        <div class="admin-currency-label">
          <span class="flag">${cur.flag}</span>
          <strong>${cur.code}</strong>
        </div>
        <input class="admin-input" type="number" step="0.0001" placeholder="0.0000"
               id="a-buy-${cur.code}" value="${buy}">
        <input class="admin-input" type="number" step="0.0001" placeholder="0.0000"
               id="a-sell-${cur.code}" value="${sell}">
      `;
      grid.appendChild(item);
    });
    document.getElementById('adminOverlay').classList.add('active');
  }

  window.closeAdmin = function() {
    document.getElementById('adminOverlay').classList.remove('active');
  };

  window.saveRates = async function() {
    const rates = {};
    CURRENCIES.forEach(cur => {
      const buy = parseFloat(document.getElementById(`a-buy-${cur.code}`).value) || null;
      const sell = parseFloat(document.getElementById(`a-sell-${cur.code}`).value) || null;
      rates[cur.code] = { buy, sell };
    });
    await saveRatesToFirebase(rates);
    closeAdmin();
  };

  // ── TRIGGER ADMIN (triple tap / click top-right corner) ──
  let tapCount = 0; let tapTimer = null;
  document.addEventListener('click', e => {
    const x = e.clientX, y = e.clientY;
    const w = window.innerWidth, h = window.innerHeight;
    // Corner zone: top-right 120x120px
    if (x > w - 120 && y < 120) {
      tapCount++;
      clearTimeout(tapTimer);
      tapTimer = setTimeout(() => { tapCount = 0; }, 1500);
      if (tapCount >= 3) { tapCount = 0; openPinOverlay(); }
    }
  });

  // ── KEYBOARD shortcut: Alt+A ──────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.altKey && e.key === 'a') openPinOverlay();
  });

  // ── INIT ──────────────────────────────────────────────────
  listenRates();
</script>
</body>
</html>
