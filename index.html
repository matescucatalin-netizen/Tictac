<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sermirav Exchange Tic Tac</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#000; color:#fff; font-family:'Oswald',sans-serif; }
.shell { width:100vw; height:100vh; display:grid; grid-template-rows:14vh 1fr 7vh; }
.header { background:#000; border-bottom:2px solid #1a1a1a; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:0 3vw; gap:2vw; }
.brand-top { font-family:'Bebas Neue',sans-serif; font-size:4.8vh; letter-spacing:0.12em; line-height:1; }
.brand-top .white { color:#fff; }
.brand-top .gold  { color:#c9a030; }
.brand-sub { font-family:'Oswald',sans-serif; font-size:1.3vh; font-weight:500; letter-spacing:0.3em; color:rgba(255,255,255,0.4); text-transform:uppercase; margin-top:0.3vh; }
.header-center { text-align:center; }
.live-row { display:inline-flex; align-items:center; gap:0.6vw; font-size:1.2vh; letter-spacing:0.3em; text-transform:uppercase; color:#00dc82; margin-bottom:0.5vh; }
.live-dot { width:0.8vh; height:0.8vh; border-radius:50%; background:#00dc82; animation:lp 1.8s ease-in-out infinite; }
@keyframes lp { 0%,100%{box-shadow:0 0 0 0 rgba(0,220,130,0.6)} 50%{box-shadow:0 0 0 1vh rgba(0,220,130,0)} }
.weather-row { display:inline-flex; align-items:center; gap:0.8vw; font-size:1.8vh; color:rgba(255,255,255,0.55); letter-spacing:0.1em; }
.weather-row strong { color:#fff; font-size:2.2vh; }
.updated { font-size:1vh; color:rgba(255,255,255,0.25); letter-spacing:0.15em; margin-top:0.3vh; }
.clock-wrap { text-align:right; }
.clock-time { font-family:'Bebas Neue',sans-serif; font-size:6.5vh; letter-spacing:0.06em; line-height:1; color:#c9a030; cursor:pointer; }
.clock-s { font-size:4vh; color:rgba(201,160,48,0.5); }
.clock-date { font-family:'Oswald',sans-serif; font-size:1.4vh; letter-spacing:0.25em; color:rgba(255,255,255,0.35); text-transform:uppercase; margin-top:0.2vh; font-weight:500; }
.col-heads { display:grid; grid-template-columns: 2.5fr 1fr 1fr; background:#000; border-bottom:1px solid #222; padding:0.6vh 2vw; flex-shrink:0; }
.col-h { font-family:'Oswald',sans-serif; font-size:1.6vh; font-weight:700; letter-spacing:0.35em; text-transform:uppercase; text-align:center; color:rgba(255,255,255,0.4); }
.col-h:first-child { text-align:left; padding-left:1vw; }
.col-h.buy { color:#00dc82; }
.col-h.sell { color:#e8334a; }
.table-wrap { display:flex; flex-direction:column; overflow:hidden; }
.rates-body { flex:1; display:flex; flex-direction:column; }
.rate-row { display:grid; grid-template-columns: 2.5fr 1fr 1fr; align-items:center; flex:1; border-bottom:1px solid #111; padding:0 2vw; }
.rate-row:last-child { border-bottom:none; }
.rate-row:nth-child(odd) { background:#050505; }
.rate-row:nth-child(even) { background:#000; }
.cur-cell { display:flex; align-items:center; gap:2vw; padding-left:1vw; }
.flag-emoji { font-size:4.5vh; line-height:1; filter:drop-shadow(0 2px 6px rgba(0,0,0,0.8)); }
.cur-name { font-family:'Oswald',sans-serif; font-size:3vh; font-weight:700; color:#fff; letter-spacing:0.05em; line-height:1.15; }
.rate-cell { text-align:center; padding:0 0.8vw; }
.rate-box { display:inline-flex; align-items:center; justify-content:center; width:100%; padding:1.2vh 0; border-radius:1.2vh; font-family:'Bebas Neue',sans-serif; font-size:5.5vh; letter-spacing:0.04em; line-height:1; transition:opacity 0.3s; }
.rate-box.buy { background:linear-gradient(135deg,#0a3d1f 0%,#0d4f27 100%); border:2px solid #1a7a3a; color:#00e87a; box-shadow:0 0 2vh rgba(0,200,80,0.15), inset 0 1px 0 rgba(0,255,100,0.1); }
.rate-box.sell { background:linear-gradient(135deg,#3d0a0a 0%,#4f0d0d 100%); border:2px solid #7a1a1a; color:#ff6b6b; box-shadow:0 0 2vh rgba(200,0,0,0.15), inset 0 1px 0 rgba(255,100,100,0.1); }
.ticker { border-top:2px solid #1a1a1a; background:#050505; display:flex; align-items:center; overflow:hidden; position:relative; }
.ticker-badge { position:absolute; left:0; z-index:5; height:100%; background:linear-gradient(135deg,#c9a030,#f0c96a); display:flex; align-items:center; padding:0 2.5vw; font-family:'Bebas Neue',sans-serif; font-size:2vh; letter-spacing:0.25em; color:#000; white-space:nowrap; flex-shrink:0; }
.ticker-badge::after { content:''; position:absolute; right:-2.5vw; top:0; border-top:7vh solid #f0c96a; border-right:2.5vw solid transparent; }
.ticker-track { display:flex; align-items:center; white-space:nowrap; animation:tickScroll 40s linear infinite; padding-left:22vw; }
@keyframes tickScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.tick-item { display:inline-flex; align-items:center; gap:0.6vw; font-family:'Oswald',sans-serif; font-size:2vh; font-weight:600; letter-spacing:0.12em; color:rgba(255,255,255,0.5); padding:0 3vw; }
.tick-item .flag { font-size:2.2vh; }
.tick-item strong { color:#fff; }
.tick-item .bv { color:#00e87a; }
.tick-item .sv { color:#ff6b6b; }
.tick-sep { display:inline-block; width:5px; height:5px; border-radius:50%; background:#c9a030; opacity:0.6; margin:0 1vw; }
.admin-btn { position:fixed; bottom:1.5vh; right:1.5vw; z-index:500; background:rgba(201,160,48,0.15); border:1px solid rgba(201,160,48,0.3); border-radius:10vh; color:rgba(201,160,48,0.7); font-family:'Oswald',sans-serif; font-size:1.4vh; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; padding:0.8vh 1.8vw; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:0.5vw; }
.admin-btn:hover { background:rgba(201,160,48,0.25); border-color:rgba(201,160,48,0.6); color:#c9a030; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.97); backdrop-filter:blur(16px); z-index:2000; align-items:center; justify-content:center; }
.overlay.show { display:flex; }
.pin-box { background:#0a0a0a; border:1px solid #222; border-radius:2vh; padding:3.5vh 3vw; text-align:center; width:26vw; }
.pin-title { font-family:'Bebas Neue',sans-serif; font-size:3vh; letter-spacing:0.25em; color:#c9a030; margin-bottom:0.5vh; }
.pin-sub { font-size:1.2vh; color:rgba(255,255,255,0.3); letter-spacing:0.15em; margin-bottom:3vh; }
.pin-dots { display:flex; justify-content:center; gap:1.5vw; margin-bottom:3vh; }
.pin-dot { width:1.5vw; height:1.5vw; border-radius:50%; border:2px solid #333; transition:all 0.2s; }
.pin-dot.on { background:#c9a030; border-color:#c9a030; box-shadow:0 0 1.5vw rgba(201,160,48,0.6); }
.pin-keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:0.8vw; }
.pin-key { padding:1.8vh 0; background:#111; border:1px solid #222; border-radius:1vh; color:#fff; font-family:'Bebas Neue',sans-serif; font-size:3vh; letter-spacing:0.1em; cursor:pointer; transition:all 0.15s; user-select:none; }
.pin-key:hover { background:rgba(201,160,48,0.15); border-color:#c9a030; }
.pin-key:active { transform:scale(0.92); }
.pin-key.sm { font-family:'Oswald',sans-serif; font-size:1.2vh; color:rgba(255,255,255,0.35); letter-spacing:0.12em; }
.pin-err { font-size:1.2vh; color:#ff4060; letter-spacing:0.2em; margin-top:1.5vh; min-height:1.8vh; }
.admin-ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); backdrop-filter:blur(16px); z-index:1999; align-items:center; justify-content:center; }
.admin-ov.show { display:flex; }
.admin-box { background:#0a0a0a; border:1px solid #222; border-radius:2vh; padding:2.5vh 2.5vw; width:52vw; max-height:90vh; overflow-y:auto; }
.adm-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:2vh; padding-bottom:1.5vh; border-bottom:1px solid #1a1a1a; }
.adm-title { font-family:'Bebas Neue',sans-serif; font-size:2.5vh; letter-spacing:0.2em; color:#c9a030; }
.adm-close { background:#111; border:1px solid #333; color:rgba(255,255,255,0.4); width:3.5vh; height:3.5vh; border-radius:50%; cursor:pointer; font-size:1.5vh; transition:all 0.2s; }
.adm-close:hover { border-color:#ff4060; color:#ff4060; }
.adm-cols { display:grid; grid-template-columns:2fr 1fr 1fr; gap:0.8vw; margin-bottom:1vh; padding:0 0.5vw; }
.adm-col { font-size:1.1vh; letter-spacing:0.3em; text-transform:uppercase; color:rgba(255,255,255,0.3); text-align:center; }
.adm-col:first-child { text-align:left; }
.adm-col.b { color:#00e87a; }
.adm-col.s { color:#ff6b6b; }
.adm-row { display:grid; grid-template-columns:2fr 1fr 1fr; gap:0.8vw; align-items:center; margin-bottom:0.8vh; padding:1vh 0.8vw; background:#0f0f0f; border-radius:1vh; border:1px solid #1a1a1a; }
.adm-cur { display:flex; align-items:center; gap:0.8vw; font-family:'Oswald',sans-serif; font-size:1.8vh; font-weight:700; color:#fff; }
.adm-flag { font-size:2.2vh; }
.adm-input { background:#000; border:1px solid #333; border-radius:0.8vh; color:#fff; font-family:'Oswald',sans-serif; font-size:1.8vh; font-weight:600; padding:0.8vh; text-align:center; width:100%; transition:border-color 0.2s; }
.adm-input:focus { outline:none; border-color:#c9a030; background:rgba(201,160,48,0.05); }
.adm-save { width:100%; margin-top:2vh; padding:1.4vh 0; background:linear-gradient(135deg,#c9a030,#f0c96a); border:none; border-radius:1vh; color:#000; font-family:'Bebas Neue',sans-serif; font-size:2.2vh; letter-spacing:0.25em; cursor:pointer; transition:opacity 0.2s; }
.adm-save:hover { opacity:0.88; }
.adm-save:disabled { opacity:0.4; }
.adm-msg { text-align:center; font-size:1.2vh; letter-spacing:0.2em; margin-top:1vh; min-height:1.5vh; }
.adm-msg.ok { color:#00e87a; }
.adm-msg.err { color:#ff4060; }
</style>
</head>
<body>
<div class="overlay" id="pinOv">
  <div class="pin-box">
    <div class="pin-title">🔐 Acces Admin</div>
    <div class="pin-sub">Introduceți codul de acces</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-keypad">
      <div class="pin-key" onclick="pk('1')">1</div><div class="pin-key" onclick="pk('2')">2</div><div class="pin-key" onclick="pk('3')">3</div>
      <div class="pin-key" onclick="pk('4')">4</div><div class="pin-key" onclick="pk('5')">5</div><div class="pin-key" onclick="pk('6')">6</div>
      <div class="pin-key" onclick="pk('7')">7</div><div class="pin-key" onclick="pk('8')">8</div><div class="pin-key" onclick="pk('9')">9</div>
      <div class="pin-key sm" onclick="pkDel()">⌫ Șterge</div>
      <div class="pin-key" onclick="pk('0')">0</div>
      <div class="pin-key sm" onclick="pinClose()">✕ Ieși</div>
    </div>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>
<div class="admin-ov" id="adminOv">
  <div class="admin-box">
    <div class="adm-head">
      <div class="adm-title">⚙ Sermirav Tic Tac — Editează Cursuri</div>
      <button class="adm-close" onclick="adminClose()">✕</button>
    </div>
    <div class="adm-cols">
      <div class="adm-col">Valută</div>
      <div class="adm-col b">Cumpărăm</div>
      <div class="adm-col s">Vindem</div>
    </div>
    <div id="adminRows"></div>
    <button class="adm-save" id="admSaveBtn" onclick="adminSave()">✓ Salvează Cursurile</button>
    <div class="adm-msg" id="admMsg"></div>
  </div>
</div>
<div class="shell">
  <header class="header">
    <div class="brand">
      <div class="brand-top"><span class="white">SERMIRAV </span><span class="gold">EXCHANGE</span></div>
      <div class="brand-top" style="font-size:3.8vh;letter-spacing:0.08em;color:#fff;margin-top:-0.3vh">TIC TAC</div>
      <div class="brand-sub">Râmnicu Vâlcea · Schimb Valutar</div>
    </div>
    <div class="header-center">
      <div class="live-row"><div class="live-dot"></div>Curs Live</div>
      <div class="weather-row"><span id="wIcon">🌤️</span><strong id="wTemp">—°C</strong><span id="wDesc">se încarcă...</span></div>
      <div class="updated" id="updatedAt">—</div>
    </div>
    <div class="clock-wrap">
      <div class="clock-time" onclick="clockTap()"><span id="cHM">--:--</span><span class="clock-s" id="cS">:00</span></div>
      <div class="clock-date" id="cDate">—</div>
    </div>
  </header>
  <div class="table-wrap">
    <div class="col-heads">
      <div class="col-h">Valută</div>
      <div class="col-h buy">Cumpărăm</div>
      <div class="col-h sell">Vindem</div>
    </div>
    <div class="rates-body" id="ratesBody"></div>
  </div>
  <div class="ticker">
    <div class="ticker-badge">Cursuri Negociabile</div>
    <div class="ticker-track" id="tickerTrack"></div>
  </div>
</div>
<button class="admin-btn" onclick="pinOpen()">⚙ Admin</button>
