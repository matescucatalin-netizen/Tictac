<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac — Schimb Valutar</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#07090d; color:#fff; font-family:'Oswald',sans-serif; }

/* ── LAYOUT ── */
.shell {
  width:100vw; height:100vh;
  display:grid;
  grid-template-rows: 13vh 1fr 7.5vh;
}

/* ══ HEADER ══ */
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 3vw;
  background:linear-gradient(180deg,#0e1118 0%,#07090d 100%);
  border-bottom:3px solid #1a1f2e;
}

.brand { display:flex; align-items:center; gap:1.5vw; }
.brand-circle {
  width:7vh; height:7vh;
  border:2.5px solid #c9a030;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  box-shadow:0 0 2vw rgba(201,160,48,0.2);
}
.brand-circle svg { width:3.5vh; height:3.5vh; fill:#c9a030; }
.brand-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:5.5vh; letter-spacing:0.12em;
  background:linear-gradient(135deg,#f0c96a,#c9a030);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  line-height:1;
}
.brand-sub {
  font-size:1.3vh; letter-spacing:0.3em;
  color:rgba(255,255,255,0.35); text-transform:uppercase; margin-top:0.4vh;
}

.header-mid { text-align:center; }
.live-pill {
  display:inline-flex; align-items:center; gap:0.6vw;
  padding:0.5vh 1.5vw;
  background:rgba(0,220,130,0.08);
  border:1px solid rgba(0,220,130,0.25);
  border-radius:100px;
  font-size:1.2vh; letter-spacing:0.3em; text-transform:uppercase; color:#00dc82;
  margin-bottom:0.6vh;
}
.live-dot { width:0.7vh; height:0.7vh; border-radius:50%; background:#00dc82; animation:lp 1.8s ease-in-out infinite; }
@keyframes lp { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,220,130,0.6)} 50%{opacity:0.5;box-shadow:0 0 0 0.8vh rgba(0,220,130,0)} }
.header-date { font-size:1.5vh; color:rgba(255,255,255,0.4); letter-spacing:0.15em; }

.header-right { display:flex; align-items:center; gap:3vw; }

.weather { text-align:right; }
.w-temp { font-family:'Bebas Neue',sans-serif; font-size:4vh; letter-spacing:0.05em; color:#fff; line-height:1; }
.w-desc { font-size:1.3vh; color:rgba(255,255,255,0.4); letter-spacing:0.1em; margin-top:0.3vh; }

.clock { text-align:right; cursor:pointer; }
.clock-hm { font-family:'Bebas Neue',sans-serif; font-size:6.5vh; letter-spacing:0.06em; line-height:1; }
.clock-s { font-size:3.5vh; color:rgba(255,255,255,0.4); }

/* ══ TABLE ══ */
.table-wrap {
  display:flex; flex-direction:column;
  overflow:hidden;
}

/* Column headers */
.col-heads {
  display:grid;
  grid-template-columns: 2.8fr 1fr 1fr;
  background:#0b0e15;
  border-bottom:2px solid #1a1f2e;
  flex-shrink:0;
}
.col-head {
  font-family:'Bebas Neue',sans-serif;
  font-size:2.8vh; letter-spacing:0.25em; text-transform:uppercase;
  padding:0.8vh 2vw; text-align:center;
}
.col-head:first-child { text-align:left; padding-left:3vw; color:rgba(255,255,255,0.5); }
.col-head.buy { color:#00dc82; }
.col-head.sell { color:#ff4060; }
.col-head-sub { display:block; font-family:'Oswald',sans-serif; font-size:1.3vh; font-weight:400; letter-spacing:0.2em; opacity:0.5; margin-top:0.1vh; }

/* Rows */
.rates-body {
  flex:1; display:flex; flex-direction:column;
}
.rate-row {
  display:grid;
  grid-template-columns: 2.8fr 1fr 1fr;
  align-items:center;
  flex:1;
  border-bottom:1px solid #111520;
  transition:background 0.3s;
}
.rate-row:nth-child(even) { background:rgba(255,255,255,0.018); }
.rate-row:last-child { border-bottom:none; }

/* Currency cell */
.cur-cell {
  display:flex; align-items:center;
  gap:2.2vw; padding:0 0 0 3vw;
}

.flag-box {
  width:7.5vw; height:5vw;
  border-radius:6px; overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,0.6), 0 0 0 1.5px rgba(255,255,255,0.12);
  flex-shrink:0;
}
.flag-box img {
  width:100%; height:100%; object-fit:cover;
  animation:fw 4s ease-in-out infinite;
  transform-origin:left center;
}
@keyframes fw {
  0%,100%{transform:skewY(0) scaleX(1)}
  30%{transform:skewY(2.5deg) scaleX(0.97)}
  70%{transform:skewY(-2deg) scaleX(1.03)}
}

.cur-info {}
.cur-code {
  font-family:'Bebas Neue',sans-serif;
  font-size:5.5vh; letter-spacing:0.08em;
  color:#fff; line-height:1;
}
.cur-name {
  font-size:1.4vh; letter-spacing:0.18em;
  color:rgba(255,255,255,0.35); text-transform:uppercase;
  margin-top:0.2vh; font-weight:400;
}

/* Rate cells */
.rate-cell {
  text-align:center; padding:0 1vw;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.rate-lbl {
  font-size:1.2vh; letter-spacing:0.3em; text-transform:uppercase;
  font-weight:500; margin-bottom:0.4vh;
}
.rate-lbl.buy { color:#00dc82; }
.rate-lbl.sell { color:#ff4060; }
.rate-val {
  font-family:'Bebas Neue',sans-serif;
  font-size:6.2vh; letter-spacing:0.04em; line-height:1;
  color:#fff;
  /* stretch vertically like Centru */
  transform:scaleY(1.3);
  display:inline-block;
  transition:color 0.4s;
}
.rate-val.buy-val { color:#e8fff5; }
.rate-val.sell-val { color:#fff2f4; }

/* vertical separator */
.rate-cell.buy {
  border-left:1px solid #1a1f2e;
}
.rate-cell.sell {
  border-left:1px solid #1a1f2e;
}

/* ══ TICKER ══ */
.ticker {
  border-top:2px solid #1a1f2e;
  background:#0b0e15;
  display:flex; align-items:center; overflow:hidden; position:relative;
}
.ticker-badge {
  position:absolute; left:0; z-index:5; height:100%;
  background:linear-gradient(135deg,#c9a030,#f0c96a);
  display:flex; align-items:center;
  padding:0 2.5vw;
  font-family:'Bebas Neue',sans-serif;
  font-size:2vh; letter-spacing:0.25em; color:#000;
  white-space:nowrap;
}
.ticker-badge::after {
  content:''; position:absolute; right:-2vw; top:0;
  border-top:7.5vh solid #f0c96a;
  border-right:2vw solid transparent;
}
.ticker-track {
  display:flex; align-items:center; white-space:nowrap;
  animation:tick 38s linear infinite;
  padding-left:20vw;
}
@keyframes tick { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.tick-item {
  display:inline-flex; align-items:center; gap:0.8vw;
  font-family:'Oswald',sans-serif; font-size:2vh;
  letter-spacing:0.12em; color:rgba(255,255,255,0.45);
  padding:0 3.5vw;
}
.tick-item strong { color:#fff; font-weight:700; }
.tick-sep { display:inline-block; width:5px; height:5px; border-radius:50%; background:#c9a030; opacity:0.5; margin:0 1.5vw; }

/* ══ PIN OVERLAY ══ */
.overlay { display:none; position:fixed; inset:0; background:rgba(7,9,13,0.97); backdrop-filter:blur(16px); z-index:2000; align-items:center; justify-content:center; }
.overlay.show { display:flex; }
.pin-box { background:#0e1118; border:1px solid #1a1f2e; border-radius:2vh; padding:3vh 3vw; text-align:center; width:24vw; }
.pin-title { font-family:'Bebas Neue',sans-serif; font-size:2.5vh; letter-spacing:0.25em; color:#c9a030; margin-bottom:0.5vh; }
.pin-sub { font-size:1.2vh; color:rgba(255,255,255,0.35); letter-spacing:0.15em; margin-bottom:2.5vh; }
.pin-dots { display:flex; justify-content:center; gap:1.5vw; margin-bottom:2.5vh; }
.pin-dot { width:1.4vw; height:1.4vw; border-radius:50%; border:2px solid #1a1f2e; transition:all 0.2s; }
.pin-dot.on { background:#c9a030; border-color:#c9a030; box-shadow:0 0 1.5vw rgba(201,160,48,0.5); }
.pin-keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:0.8vw; }
.pin-key { padding:1.5vh 0; background:#161b26; border:1px solid #1a1f2e; border-radius:1vh; color:#fff; font-family:'Bebas Neue',sans-serif; font-size:2.5vh; letter-spacing:0.1em; cursor:pointer; transition:all 0.15s; user-select:none; }
.pin-key:hover { background:rgba(201,160,48,0.15); border-color:#c9a030; }
.pin-key:active { transform:scale(0.93); }
.pin-key.sm { font-family:'Oswald',sans-serif; font-size:1.2vh; color:rgba(255,255,255,0.4); letter-spacing:0.15em; }
.pin-err { font-size:1.2vh; color:#ff4060; letter-spacing:0.2em; margin-top:1.5vh; min-height:1.8vh; }

/* ══ ADMIN OVERLAY ══ */
.admin-ov { display:none; position:fixed; inset:0; background:rgba(7,9,13,0.98); backdrop-filter:blur(16px); z-index:1999; align-items:center; justify-content:center; }
.admin-ov.show { display:flex; }
.admin-box { background:#0e1118; border:1px solid #1a1f2e; border-radius:2vh; padding:2.5vh 2.5vw; width:50vw; max-height:90vh; overflow-y:auto; }
.adm-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:2vh; padding-bottom:1.5vh; border-bottom:1px solid #1a1f2e; }
.adm-title { font-family:'Bebas Neue',sans-serif; font-size:2.5vh; letter-spacing:0.2em; color:#c9a030; }
.adm-close { background:#161b26; border:1px solid #1a1f2e; color:rgba(255,255,255,0.4); width:3.5vh; height:3.5vh; border-radius:50%; cursor:pointer; font-size:1.5vh; transition:all 0.2s; }
.adm-close:hover { border-color:#ff4060; color:#ff4060; }
.adm-cols { display:grid; grid-template-columns:2fr 1fr 1fr; gap:0.8vw; margin-bottom:0.8vh; padding:0 0.5vw; }
.adm-col { font-size:1.1vh; letter-spacing:0.3em; text-transform:uppercase; color:rgba(255,255,255,0.35); text-align:center; }
.adm-col:first-child { text-align:left; }
.adm-col.b { color:#00dc82; }
.adm-col.s { color:#ff4060; }
.adm-row { display:grid; grid-template-columns:2fr 1fr 1fr; gap:0.8vw; align-items:center; margin-bottom:0.7vh; padding:1vh 0.8vw; background:#161b26; border-radius:1vh; border:1px solid #1a1f2e; }
.adm-cur { display:flex; align-items:center; gap:0.8vw; font-family:'Bebas Neue',sans-serif; font-size:2vh; letter-spacing:0.08em; color:#fff; }
.adm-flag { width:2.8vw; height:1.9vw; border-radius:3px; object-fit:cover; box-shadow:0 0 0 1px rgba(255,255,255,0.15); }
.adm-input { background:#0e1118; border:1px solid #1a1f2e; border-radius:0.8vh; color:#fff; font-family:'Oswald',sans-serif; font-size:1.8vh; font-weight:600; padding:0.8vh; text-align:center; width:100%; transition:border-color 0.2s; }
.adm-input:focus { outline:none; border-color:#c9a030; background:rgba(201,160,48,0.05); }
.adm-save { width:100%; margin-top:1.8vh; padding:1.3vh 0; background:linear-gradient(135deg,#c9a030,#f0c96a); border:none; border-radius:1vh; color:#000; font-family:'Bebas Neue',sans-serif; font-size:2vh; letter-spacing:0.25em; cursor:pointer; transition:opacity 0.2s; }
.adm-save:hover { opacity:0.88; }
.adm-save:disabled { opacity:0.4; }
.adm-msg { text-align:center; font-size:1.2vh; letter-spacing:0.2em; margin-top:1vh; min-height:1.5vh; }
.adm-msg.ok { color:#00dc82; }
.adm-msg.err { color:#ff4060; }
</style>
</head>
<body>

<!-- PIN -->
<div class="overlay" id="pinOv">
  <div class="pin-box">
    <div class="pin-title">Acces Admin</div>
    <div class="pin-sub">Introduceți codul de acces</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-keypad">
      <div class="pin-key" onclick="pk('1')">1</div><div class="pin-key" onclick="pk('2')">2</div><div class="pin-key" onclick="pk('3')">3</div>
      <div class="pin-key" onclick="pk('4')">4</div><div class="pin-key" onclick="pk('5')">5</div><div class="pin-key" onclick="pk('6')">6</div>
      <div class="pin-key" onclick="pk('7')">7</div><div class="pin-key" onclick="pk('8')">8</div><div class="pin-key" onclick="pk('9')">9</div>
      <div class="pin-key sm" onclick="pkDel()">⌫ Șterge</div>
      <div class="pin-key" onclick="pk('0')">0</div>
      <div class="pin-key sm" onclick="pinClose()">✕ Ieși</div>
    </div>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-ov" id="adminOv">
  <div class="admin-box">
    <div class="adm-head">
      <div class="adm-title">⚙ Tic Tac — Editează Cursuri</div>
      <button class="adm-close" onclick="adminClose()">✕</button>
    </div>
    <div class="adm-cols">
      <div class="adm-col">Valută</div>
      <div class="adm-col b">Cumpărăm</div>
      <div class="adm-col s">Vindem</div>
    </div>
    <div id="adminRows"></div>
    <button class="adm-save" id="admSaveBtn" onclick="adminSave()">✓ Salvează Cursurile</button>
    <div class="adm-msg" id="admMsg"></div>
  </div>
</div>

<!-- MAIN -->
<div class="shell">

  <!-- HEADER -->
  <header class="header">
    <div class="brand">
      <div class="brand-circle">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
      </div>
      <div>
        <div class="brand-name">Tic Tac</div>
        <div class="brand-sub">Casa de Schimb Valutar · Râmnicu Vâlcea</div>
      </div>
    </div>

    <div class="header-mid">
      <div class="live-pill"><div class="live-dot"></div>Cursuri în timp real</div>
      <div class="header-date" id="hDate">—</div>
    </div>

    <div class="header-right">
      <div class="weather">
        <div class="w-temp" id="wTemp">—°C</div>
        <div class="w-desc" id="wDesc">📍 Râmnicu Vâlcea</div>
      </div>
      <div class="clock" onclick="clockTap()">
        <span class="clock-hm" id="cHM">--:--</span><span class="clock-s" id="cS">:00</span>
      </div>
    </div>
  </header>

  <!-- TABLE -->
  <div class="table-wrap">
    <div class="col-heads">
      <div class="col-head">Valută</div>
      <div class="col-head buy">Cumpărăm <span class="col-head-sub">We Buy</span></div>
      <div class="col-head sell">Vindem <span class="col-head-sub">We Sell</span></div>
    </div>
    <div class="rates-body" id="ratesBody"></div>
  </div>

  <!-- TICKER -->
  <div class="ticker">
    <div class="ticker-badge">Cursuri Negociabile</div>
    <div class="ticker-track" id="tickerTrack"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const PIN = '1234';
const FB = { databaseURL:'https://sermirav-exchange-default-rtdb.europe-west1.firebasedatabase.app/' };
const PATH = 'tictac/rates';

const CURRENCIES = [
  {code:'EUR',name:'Euro',            flag:'https://flagcdn.com/w80/eu.png'},
  {code:'USD',name:'Dolar American',  flag:'https://flagcdn.com/w80/us.png'},
  {code:'GBP',name:'Liră Sterlină',   flag:'https://flagcdn.com/w80/gb.png'},
  {code:'CHF',name:'Franc Elvețian',  flag:'https://flagcdn.com/w80/ch.png'},
  {code:'CAD',name:'Dolar Canadian',  flag:'https://flagcdn.com/w80/ca.png'},
  {code:'AUD',name:'Dolar Australian',flag:'https://flagcdn.com/w80/au.png'},
  {code:'PLN',name:'Zlot Polonez',    flag:'https://flagcdn.com/w80/pl.png'},
  {code:'TRY',name:'Liră Turcească',  flag:'https://flagcdn.com/w80/tr.png'},
  {code:'HUF',name:'Forint Maghiar',  flag:'https://flagcdn.com/w80/hu.png'},
  {code:'BGN',name:'Levă Bulgărească',flag:'https://flagcdn.com/w80/bg.png'},
];

const DEF = {EUR:{buy:4.97,sell:5.05},USD:{buy:4.33,sell:4.45},GBP:{buy:5.82,sell:6.03},CHF:{buy:5.59,sell:5.71},CAD:{buy:3.07,sell:3.30},AUD:{buy:2.76,sell:3.10},PLN:{buy:1.14,sell:1.22},TRY:{buy:0.095,sell:0.119},HUF:{buy:0.013,sell:0.0141},BGN:{buy:2.25,sell:2.66}};

const app = initializeApp(FB);
const db  = getDatabase(app);
let rates = {...DEF};

// Firebase live
onValue(ref(db, PATH), snap => {
  const d = snap.val();
  if (d) { rates = d; updateVals(); updateTicker(); }
});

function fmt(v) { return (v===null||v===undefined||v==='') ? '—' : parseFloat(v).toFixed(4); }

// Build rows once
function buildRows() {
  const body = document.getElementById('ratesBody');
  body.innerHTML = '';
  CURRENCIES.forEach((cur,i) => {
    const row = document.createElement('div');
    row.className = 'rate-row';
    row.innerHTML = `
      <div class="cur-cell">
        <div class="flag-box">
          <img src="${cur.flag}" alt="${cur.code}" style="animation-delay:${i*0.45}s">
        </div>
        <div class="cur-info">
          <div class="cur-code">${cur.code}</div>
          <div class="cur-name">${cur.name}</div>
        </div>
      </div>
      <div class="rate-cell buy">
        <div class="rate-lbl buy">Cumpărăm</div>
        <div class="rate-val buy-val" id="b-${cur.code}">${fmt(rates[cur.code]?.buy)}</div>
      </div>
      <div class="rate-cell sell">
        <div class="rate-lbl sell">Vindem</div>
        <div class="rate-val sell-val" id="s-${cur.code}">${fmt(rates[cur.code]?.sell)}</div>
      </div>
    `;
    body.appendChild(row);
  });
}

function updateVals() {
  CURRENCIES.forEach(cur => {
    const b = document.getElementById('b-'+cur.code);
    const s = document.getElementById('s-'+cur.code);
    if(b) b.textContent = fmt(rates[cur.code]?.buy);
    if(s) s.textContent = fmt(rates[cur.code]?.sell);
  });
}

function updateTicker() {
  const track = document.getElementById('tickerTrack');
  const items = CURRENCIES.map(cur =>
    `<span class="tick-item"><img src="${cur.flag}" style="height:2.5vh;border-radius:3px;vertical-align:middle;margin-right:0.5vw"><strong>${cur.code}</strong> &nbsp;Cump <strong>${fmt(rates[cur.code]?.buy)}</strong> &nbsp;·&nbsp; Vând <strong>${fmt(rates[cur.code]?.sell)}</strong></span><span class="tick-sep"></span>`
  ).join('');
  track.innerHTML = items + items;
}

// Clock
const DAYS=['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'];
const MONTHS=['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
function tick(){
  const n=new Date();
  document.getElementById('cHM').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  document.getElementById('cS').textContent=':'+String(n.getSeconds()).padStart(2,'0');
  document.getElementById('hDate').textContent=`${DAYS[n.getDay()]}, ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
}
tick(); setInterval(tick,1000);

// Weather
const WI={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',73:'❄️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
const WD={0:'Senin',1:'Senin',2:'Parțial noros',3:'Noros',45:'Ceață',48:'Ceață',51:'Burniță',53:'Burniță',55:'Burniță',61:'Ploaie',63:'Ploaie',65:'Ploaie',71:'Ninsoare',73:'Ninsoare',75:'Ninsoare',80:'Averse',81:'Averse',82:'Averse',95:'Furtună',96:'Furtună',99:'Furtună'};
async function fetchWeather(){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=45.0997&longitude=24.3693&current=temperature_2m,weathercode&timezone=auto');
    const d=await r.json();
    const temp=Math.round(d.current.temperature_2m);
    const code=d.current.weathercode;
    document.getElementById('wTemp').textContent=`${WI[code]||'🌤️'} ${temp}°C`;
    document.getElementById('wDesc').textContent=(WD[code]||'')+' · Râmnicu Vâlcea';
  }catch(e){}
}
fetchWeather(); setInterval(fetchWeather,600000);

// PIN
let buf='';
window.pk=function(d){
  if(buf.length>=4)return; buf+=d;
  for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('on',i<buf.length);
  if(buf.length===4){
    setTimeout(()=>{
      if(buf===PIN){pinClose();adminOpen();}
      else{
        document.getElementById('pinErr').textContent='Cod incorect.';
        setTimeout(()=>{buf='';for(let i=0;i<4;i++)document.getElementById('pd'+i).classList.remove('on');document.getElementById('pinErr').textContent='';},900);
      }
      buf='';
    },150);
  }
};
window.pkDel=function(){buf=buf.slice(0,-1);for(let i=0;i<4;i++)document.getElementById('pd'+i).classList.toggle('on',i<buf.length);};
window.pinClose=function(){document.getElementById('pinOv').classList.remove('show');buf='';for(let i=0;i<4;i++)document.getElementById('pd'+i).classList.remove('on');document.getElementById('pinErr').textContent='';};
function pinOpen(){document.getElementById('pinOv').classList.add('show');}

// Clock triple tap
let tc=0,tt=null;
window.clockTap=function(){tc++;clearTimeout(tt);tt=setTimeout(()=>tc=0,1400);if(tc>=3){tc=0;pinOpen();}};

document.addEventListener('keydown',e=>{
  if(e.altKey&&e.key==='a')pinOpen();
  if(e.key==='Escape'){pinClose();adminClose();}
});

// ADMIN
function adminOpen(){
  const rows=document.getElementById('adminRows');
  rows.innerHTML='';
  CURRENCIES.forEach(cur=>{
    const b=rates[cur.code]?.buy??'';
    const s=rates[cur.code]?.sell??'';
    const row=document.createElement('div');
    row.className='adm-row';
    row.innerHTML=`
      <div class="adm-cur"><img class="adm-flag" src="${cur.flag}" alt="${cur.code}"> ${cur.code}</div>
      <input class="adm-input" type="number" step="0.0001" id="ab-${cur.code}" value="${b}">
      <input class="adm-input" type="number" step="0.0001" id="as-${cur.code}" value="${s}">
    `;
    rows.appendChild(row);
  });
  document.getElementById('adminOv').classList.add('show');
}
window.adminClose=function(){document.getElementById('adminOv').classList.remove('show');};
window.adminSave=async function(){
  const btn=document.getElementById('admSaveBtn');
  const msg=document.getElementById('admMsg');
  btn.disabled=true; btn.textContent='⏳ Se salvează...';
  const nr={};
  CURRENCIES.forEach(cur=>{
    nr[cur.code]={
      buy:parseFloat(document.getElementById('ab-'+cur.code).value)||null,
      sell:parseFloat(document.getElementById('as-'+cur.code).value)||null,
    };
  });
  try{
    await set(ref(db,PATH),nr);
    msg.textContent='✓ Salvat!'; msg.className='adm-msg ok';
  }catch(e){msg.textContent='✕ Eroare: '+e.message; msg.className='adm-msg err';}
  btn.disabled=false; btn.textContent='✓ Salvează Cursurile';
  setTimeout(()=>{msg.textContent='';msg.className='adm-msg';},4000);
};

buildRows();
updateTicker();
