<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac — Schimb Valutar</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06070a;
  --surface: #0e1117;
  --surface2: #161b24;
  --border: rgba(255,255,255,0.06);
  --gold: #d4a843;
  --gold2: #f0c96a;
  --green: #00e5a0;
  --red: #ff4060;
  --white: #f2f4f8;
  --muted: rgba(242,244,248,0.38);
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--white); font-family:'DM Sans',sans-serif; }

/* ── NOISE OVERLAY ── */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.025; background-size:180px;
}

/* ── AMBIENT GLOW ── */
.glow-tl {
  position:fixed; top:-20vh; left:-10vw;
  width:60vw; height:60vh;
  background:radial-gradient(ellipse, rgba(212,168,67,0.07) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}
.glow-br {
  position:fixed; bottom:-20vh; right:-10vw;
  width:50vw; height:50vh;
  background:radial-gradient(ellipse, rgba(0,229,160,0.04) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

/* ── LAYOUT ── */
.shell {
  position:relative; z-index:1;
  width:100vw; height:100vh;
  display:grid;
  grid-template-rows: 13vh 1fr 8vh;
}

/* ══ HEADER ══════════════════════════════════════════════ */
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 3.5vw;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg, rgba(14,17,23,0.9) 0%, transparent 100%);
}

.brand { display:flex; align-items:center; gap:1.8vw; }

.brand-mark {
  width:5.5vh; height:5.5vh;
  border:2px solid var(--gold);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  position:relative; flex-shrink:0;
}
.brand-mark::after {
  content:''; position:absolute; inset:-4px;
  border-radius:50%;
  border:1px solid rgba(212,168,67,0.2);
  animation:ringPulse 3s ease-in-out infinite;
}
@keyframes ringPulse {
  0%,100% { transform:scale(1); opacity:1; }
  50% { transform:scale(1.08); opacity:0.4; }
}
.brand-mark svg { width:2.2vh; height:2.2vh; fill:var(--gold); }

.brand-text {}
.brand-name {
  font-family:'Unbounded',sans-serif;
  font-size:2.8vw; font-weight:900;
  letter-spacing:0.08em;
  background:linear-gradient(135deg, var(--gold2), var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  line-height:1;
}
.brand-tagline {
  font-size:0.75vw; letter-spacing:0.3em; color:var(--muted);
  text-transform:uppercase; margin-top:0.3vh;
}

.header-center {
  display:flex; flex-direction:column; align-items:center; gap:0.4vh;
}
.live-badge {
  display:flex; align-items:center; gap:0.6vw;
  padding:0.4vh 1.2vw;
  background:rgba(0,229,160,0.08);
  border:1px solid rgba(0,229,160,0.2);
  border-radius:100px;
  font-size:0.7vw; letter-spacing:0.25em; text-transform:uppercase;
  color:var(--green);
}
.live-dot {
  width:0.5vw; height:0.5vw; border-radius:50%;
  background:var(--green);
  animation:livePulse 1.8s ease-in-out infinite;
}
@keyframes livePulse {
  0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(0,229,160,0.5); }
  50% { opacity:0.6; box-shadow:0 0 0 0.4vw rgba(0,229,160,0); }
}
.header-date {
  font-size:0.8vw; color:var(--muted); letter-spacing:0.15em;
}

.header-right { display:flex; align-items:center; gap:3vw; }

.weather-block { text-align:right; }
.weather-temp {
  font-family:'Unbounded',sans-serif;
  font-size:2vw; font-weight:700;
  color:var(--white); line-height:1;
}
.weather-desc { font-size:0.75vw; color:var(--muted); letter-spacing:0.1em; margin-top:0.3vh; }

.clock-block { text-align:right; }
.clock-time {
  font-family:'Unbounded',sans-serif;
  font-size:3.2vw; font-weight:900;
  letter-spacing:0.04em; line-height:1;
  cursor:pointer;
}
.clock-secs {
  font-size:1.8vw; font-weight:400;
  color:var(--muted); margin-left:0.2vw;
}

/* ══ RATES GRID ══════════════════════════════════════════ */
.rates-grid {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:1px;
  background:var(--border);
  overflow:hidden;
}

.rate-card {
  background:var(--surface);
  display:flex; flex-direction:column;
  justify-content:space-between;
  padding:1.8vh 1.6vw;
  position:relative; overflow:hidden;
  transition:background 0.3s;
}

/* Subtle top accent line per card */
.rate-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity:0; transition:opacity 0.3s;
}

/* Card top: flag + code */
.card-top { display:flex; align-items:center; gap:1vw; }

.flag-wrap {
  width:4vw; height:2.7vw;
  border-radius:4px; overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
  flex-shrink:0;
  position:relative;
}
.flag-wrap img {
  width:100%; height:100%; object-fit:cover;
  animation:flagWave 4s ease-in-out infinite;
  transform-origin:left center;
}
@keyframes flagWave {
  0%,100% { transform:skewY(0deg) scaleX(1); }
  25% { transform:skewY(2deg) scaleX(0.98); }
  75% { transform:skewY(-2deg) scaleX(1.02); }
}

.card-meta {}
.card-code {
  font-family:'Unbounded',sans-serif;
  font-size:1.5vw; font-weight:900;
  color:var(--white); letter-spacing:0.06em;
  line-height:1;
}
.card-name {
  font-size:0.6vw; color:var(--muted);
  letter-spacing:0.15em; text-transform:uppercase;
  margin-top:0.3vh;
}

/* Card rates section */
.card-rates {
  display:grid; grid-template-columns:1fr 1fr;
  gap:0.8vw;
}
.rate-block {}
.rate-lbl {
  font-size:0.55vw; letter-spacing:0.3em; text-transform:uppercase;
  font-weight:500; margin-bottom:0.3vh;
}
.rate-lbl.buy { color:var(--green); }
.rate-lbl.sell { color:var(--red); }
.rate-num {
  font-family:'Unbounded',sans-serif;
  font-size:1.65vw; font-weight:700;
  line-height:1; letter-spacing:0.02em;
  color:var(--white);
  transition:color 0.4s;
}
.rate-unit {
  font-size:0.5vw; color:var(--muted);
  letter-spacing:0.15em; text-transform:uppercase;
  margin-top:0.2vh;
}

/* Card divider */
.card-divider {
  height:1px;
  background:linear-gradient(90deg, transparent, var(--border), transparent);
  margin:0.5vh 0;
}

/* ══ TICKER ══════════════════════════════════════════════ */
.ticker-shell {
  border-top:1px solid var(--border);
  background:var(--surface);
  display:flex; align-items:center;
  overflow:hidden; position:relative;
}
.ticker-badge {
  position:absolute; left:0; z-index:10;
  height:100%;
  background:linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  display:flex; align-items:center;
  padding:0 2.5vw;
  font-family:'Unbounded',sans-serif;
  font-size:0.75vw; font-weight:700;
  letter-spacing:0.2em; text-transform:uppercase;
  color:#000; white-space:nowrap;
}
.ticker-badge::after {
  content:''; position:absolute; right:-2vw; top:0;
  border-top:4vh solid var(--gold2);
  border-right:2vw solid transparent;
}
.ticker-track {
  display:flex; align-items:center;
  white-space:nowrap;
  animation:tickerScroll 40s linear infinite;
  padding-left:18vw;
}
@keyframes tickerScroll {
  0% { transform:translateX(0); }
  100% { transform:translateX(-50%); }
}
.ticker-item {
  display:inline-flex; align-items:center; gap:0.8vw;
  padding:0 3vw;
  font-size:1.05vw; letter-spacing:0.1em;
  color:var(--muted);
}
.ticker-item strong { color:var(--white); font-weight:600; }
.ticker-sep {
  display:inline-block;
  width:4px; height:4px; border-radius:50%;
  background:var(--gold); opacity:0.5;
  margin:0 1.5vw;
}

/* ══ PIN OVERLAY ══════════════════════════════════════════ */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(6,7,10,0.96);
  backdrop-filter:blur(20px);
  z-index:2000; align-items:center; justify-content:center;
}
.overlay.show { display:flex; }

.pin-box {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:2vw;
  padding:3vw 3.5vw;
  text-align:center; width:28vw;
}
.pin-title {
  font-family:'Unbounded',sans-serif;
  font-size:1.1vw; font-weight:700;
  letter-spacing:0.2em; text-transform:uppercase;
  color:var(--gold); margin-bottom:0.5vh;
}
.pin-sub { font-size:0.7vw; color:var(--muted); letter-spacing:0.15em; margin-bottom:2.5vh; }
.pin-dots { display:flex; justify-content:center; gap:1.2vw; margin-bottom:2.5vh; }
.pin-dot {
  width:1.2vw; height:1.2vw; border-radius:50%;
  border:2px solid var(--border);
  transition:all 0.2s;
}
.pin-dot.on { background:var(--gold); border-color:var(--gold); box-shadow:0 0 1.5vw rgba(212,168,67,0.5); }
.pin-keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:0.8vw; }
.pin-key {
  padding:1.2vh 0;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:0.8vw;
  color:var(--white);
  font-family:'Unbounded',sans-serif;
  font-size:1.2vw; font-weight:700;
  cursor:pointer; transition:all 0.15s;
  user-select:none;
}
.pin-key:hover { background:rgba(212,168,67,0.12); border-color:var(--gold); }
.pin-key:active { transform:scale(0.94); }
.pin-key.del { font-size:0.8vw; color:var(--muted); letter-spacing:0.1em; }
.pin-key.esc { font-size:0.75vw; color:var(--muted); letter-spacing:0.1em; }
.pin-err { font-size:0.65vw; color:var(--red); letter-spacing:0.2em; margin-top:1.5vh; min-height:1.5vh; }

/* ══ ADMIN OVERLAY ══════════════════════════════════════ */
.admin-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(6,7,10,0.97);
  backdrop-filter:blur(20px);
  z-index:1999; align-items:center; justify-content:center;
}
.admin-overlay.show { display:flex; }

.admin-box {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:2vw;
  padding:2.5vw 3vw;
  width:52vw; max-height:88vh; overflow-y:auto;
}
.admin-head {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:2.5vh; padding-bottom:1.5vh;
  border-bottom:1px solid var(--border);
}
.admin-head-title {
  font-family:'Unbounded',sans-serif;
  font-size:1.1vw; font-weight:700;
  letter-spacing:0.2em; color:var(--gold);
}
.admin-close {
  background:var(--surface2); border:1px solid var(--border);
  color:var(--muted); width:2.5vw; height:2.5vw;
  border-radius:50%; cursor:pointer; font-size:0.9vw;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
.admin-close:hover { border-color:var(--red); color:var(--red); }

.admin-cols {
  display:grid; grid-template-columns:2fr 1fr 1fr;
  gap:0.8vw; margin-bottom:1vh;
  padding:0 0.5vw;
}
.admin-col-lbl {
  font-size:0.6vw; letter-spacing:0.3em; text-transform:uppercase;
  color:var(--muted); text-align:center;
}
.admin-col-lbl:first-child { text-align:left; }
.admin-col-lbl.buy { color:var(--green); }
.admin-col-lbl.sell { color:var(--red); }

.admin-row {
  display:grid; grid-template-columns:2fr 1fr 1fr;
  gap:0.8vw; align-items:center;
  margin-bottom:0.8vh;
  padding:1vh 0.8vw;
  background:var(--surface2); border-radius:0.8vw;
  border:1px solid var(--border);
}
.admin-cur {
  display:flex; align-items:center; gap:0.8vw;
  font-family:'Unbounded',sans-serif;
  font-size:0.85vw; font-weight:700; color:var(--white);
}
.admin-flag { width:2.2vw; height:1.5vw; border-radius:3px; object-fit:cover; }
.admin-input {
  background:var(--surface); border:1px solid var(--border);
  border-radius:0.6vw; color:var(--white);
  font-family:'Unbounded',sans-serif;
  font-size:0.9vw; font-weight:600;
  padding:0.8vh 0.6vw; text-align:center; width:100%;
  transition:border-color 0.2s;
}
.admin-input:focus { outline:none; border-color:var(--gold); background:rgba(212,168,67,0.05); }

.admin-save {
  width:100%; margin-top:2vh; padding:1.2vh 0;
  background:linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  border:none; border-radius:0.8vw;
  color:#000; font-family:'Unbounded',sans-serif;
  font-size:0.85vw; font-weight:700;
  letter-spacing:0.2em; text-transform:uppercase;
  cursor:pointer; transition:opacity 0.2s;
}
.admin-save:hover { opacity:0.88; }
.admin-save:disabled { opacity:0.4; }
.admin-msg {
  text-align:center; font-size:0.65vw; letter-spacing:0.2em;
  margin-top:1vh; min-height:1.5vh; transition:opacity 0.3s;
}
.admin-msg.ok { color:var(--green); }
.admin-msg.err { color:var(--red); }
</style>
</head>
<body>

<div class="glow-tl"></div>
<div class="glow-br"></div>

<!-- PIN -->
<div class="overlay" id="pinOverlay">
  <div class="pin-box">
    <div class="pin-title">Acces Admin</div>
    <div class="pin-sub">Introduceți codul de acces</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-keypad">
      <div class="pin-key" onclick="pk('1')">1</div>
      <div class="pin-key" onclick="pk('2')">2</div>
      <div class="pin-key" onclick="pk('3')">3</div>
      <div class="pin-key" onclick="pk('4')">4</div>
      <div class="pin-key" onclick="pk('5')">5</div>
      <div class="pin-key" onclick="pk('6')">6</div>
      <div class="pin-key" onclick="pk('7')">7</div>
      <div class="pin-key" onclick="pk('8')">8</div>
      <div class="pin-key" onclick="pk('9')">9</div>
      <div class="pin-key del" onclick="pkDel()">⌫ Șterge</div>
      <div class="pin-key" onclick="pk('0')">0</div>
      <div class="pin-key esc" onclick="pinClose()">✕ Ieși</div>
    </div>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-box">
    <div class="admin-head">
      <div class="admin-head-title">⚙ Tic Tac — Editează Cursuri</div>
      <button class="admin-close" onclick="adminClose()">✕</button>
    </div>
    <div class="admin-cols">
      <div class="admin-col-lbl">Valută</div>
      <div class="admin-col-lbl buy">Cumpărăm</div>
      <div class="admin-col-lbl sell">Vindem</div>
    </div>
    <div id="adminRows"></div>
    <button class="admin-save" id="adminSaveBtn" onclick="adminSave()">✓ Salvează Cursurile</button>
    <div class="admin-msg" id="adminMsg"></div>
  </div>
</div>

<!-- SHELL -->
<div class="shell">

  <!-- HEADER -->
  <header class="header">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm4.24 16L12 15.45 7.77 18l1.12-4.81-3.73-3.23 4.92-.42L12 5l1.92 4.53 4.92.42-3.73 3.23L16.23 18z"/></svg>
      </div>
      <div class="brand-text">
        <div class="brand-name">Tic Tac</div>
        <div class="brand-tagline">Casa de Schimb Valutar · Râmnicu Vâlcea</div>
      </div>
    </div>

    <div class="header-center">
      <div class="live-badge">
        <div class="live-dot"></div>
        Cursuri în timp real
      </div>
      <div class="header-date" id="headerDate">—</div>
    </div>

    <div class="header-right">
      <div class="weather-block">
        <div class="weather-temp" id="wTemp">—°C</div>
        <div class="weather-desc" id="wDesc">📍 Râmnicu Vâlcea</div>
      </div>
      <div class="clock-block">
        <div class="clock-time" id="clockEl" onclick="clockTap()">
          <span id="clockHM">--:--</span><span class="clock-secs" id="clockS">:00</span>
        </div>
      </div>
    </div>
  </header>

  <!-- RATES -->
  <div class="rates-grid" id="ratesGrid"></div>

  <!-- TICKER -->
  <div class="ticker-shell">
    <div class="ticker-badge">Cursuri Negociabile</div>
    <div class="ticker-track" id="tickerTrack"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── CONFIG ──────────────────────────────────────────────
const FB_CONFIG = {
  databaseURL: 'https://sermirav-exchange-default-rtdb.europe-west1.firebasedatabase.app/'
};
const FB_PATH = 'tictac/rates';
const PIN = '1234';

const CURRENCIES = [
  { code:'EUR', name:'Euro',             flag:'https://flagcdn.com/w80/eu.png' },
  { code:'USD', name:'Dolar American',   flag:'https://flagcdn.com/w80/us.png' },
  { code:'GBP', name:'Liră Sterlină',    flag:'https://flagcdn.com/w80/gb.png' },
  { code:'CHF', name:'Franc Elvețian',   flag:'https://flagcdn.com/w80/ch.png' },
  { code:'CAD', name:'Dolar Canadian',   flag:'https://flagcdn.com/w80/ca.png' },
  { code:'AUD', name:'Dolar Australian', flag:'https://flagcdn.com/w80/au.png' },
  { code:'PLN', name:'Zlot Polonez',     flag:'https://flagcdn.com/w80/pl.png' },
  { code:'TRY', name:'Liră Turcească',   flag:'https://flagcdn.com/w80/tr.png' },
  { code:'HUF', name:'Forint Maghiar',   flag:'https://flagcdn.com/w80/hu.png' },
  { code:'BGN', name:'Levă Bulgărească', flag:'https://flagcdn.com/w80/bg.png' },
];

const DEFAULT_RATES = {
  EUR:{buy:4.9700,sell:5.0500},
  USD:{buy:4.3300,sell:4.4500},
  GBP:{buy:5.8200,sell:6.0300},
  CHF:{buy:5.5900,sell:5.7100},
  CAD:{buy:3.0700,sell:3.3000},
  AUD:{buy:2.7600,sell:3.1000},
  PLN:{buy:1.1400,sell:1.2200},
  TRY:{buy:0.0950,sell:0.1190},
  HUF:{buy:0.0130,sell:0.0141},
  BGN:{buy:2.2500,sell:2.6600},
};

// ── FIREBASE ────────────────────────────────────────────
const app = initializeApp(FB_CONFIG);
const db  = getDatabase(app);
let rates = { ...DEFAULT_RATES };

onValue(ref(db, FB_PATH), snap => {
  const data = snap.val();
  if (data) {
    rates = data;
    renderCards();
    renderTicker();
  }
});

async function saveToFirebase(newRates) {
  await set(ref(db, FB_PATH), newRates);
}

// ── RENDER CARDS ────────────────────────────────────────
function fmt(v) {
  if (v === null || v === undefined || v === '') return '—';
  return parseFloat(v).toFixed(4);
}

function renderCards() {
  const grid = document.getElementById('ratesGrid');
  if (!grid.children.length) {
    // First render — build cards
    grid.innerHTML = '';
    CURRENCIES.forEach((cur, i) => {
      const card = document.createElement('div');
      card.className = 'rate-card';
      card.style.animationDelay = i * 0.06 + 's';
      card.innerHTML = `
        <div class="card-top">
          <div class="flag-wrap">
            <img src="${cur.flag}" alt="${cur.code}" style="animation-delay:${i*0.5}s">
          </div>
          <div class="card-meta">
            <div class="card-code">${cur.code}</div>
            <div class="card-name">${cur.name}</div>
          </div>
        </div>
        <div class="card-divider"></div>
        <div class="card-rates">
          <div class="rate-block">
            <div class="rate-lbl buy">Cumpărăm</div>
            <div class="rate-num" id="buy-${cur.code}">${fmt(rates[cur.code]?.buy)}</div>
            <div class="rate-unit">RON / 1 ${cur.code}</div>
          </div>
          <div class="rate-block">
            <div class="rate-lbl sell">Vindem</div>
            <div class="rate-num" id="sell-${cur.code}">${fmt(rates[cur.code]?.sell)}</div>
            <div class="rate-unit">RON / 1 ${cur.code}</div>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  } else {
    // Update values only
    CURRENCIES.forEach(cur => {
      const b = document.getElementById('buy-' + cur.code);
      const s = document.getElementById('sell-' + cur.code);
      if (b) b.textContent = fmt(rates[cur.code]?.buy);
      if (s) s.textContent = fmt(rates[cur.code]?.sell);
    });
  }
}

// ── TICKER ──────────────────────────────────────────────
function renderTicker() {
  const track = document.getElementById('tickerTrack');
  let html = '';
  const items = CURRENCIES.map(cur => {
    const b = fmt(rates[cur.code]?.buy);
    const s = fmt(rates[cur.code]?.sell);
    return `<span class="ticker-item"><img src="${cur.flag}" style="height:1.8vh;border-radius:2px;vertical-align:middle;margin-right:0.4vw"> <strong>${cur.code}</strong> &nbsp;Cump <strong>${b}</strong> &nbsp;·&nbsp; Vând <strong>${s}</strong></span><span class="ticker-sep"></span>`;
  }).join('');
  track.innerHTML = items + items;
}

// ── CLOCK ────────────────────────────────────────────────
const DAYS   = ['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'];
const MONTHS = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];

function tick() {
  const n = new Date();
  document.getElementById('clockHM').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clockS').textContent =
    ':' + String(n.getSeconds()).padStart(2,'0');
  document.getElementById('headerDate').textContent =
    `${DAYS[n.getDay()]}, ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
}
tick(); setInterval(tick, 1000);

// ── WEATHER ──────────────────────────────────────────────
const WI = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',73:'❄️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
const WD = {0:'Senin',1:'Senin',2:'Parțial noros',3:'Noros',45:'Ceață',48:'Ceață',51:'Burniță',53:'Burniță',55:'Burniță',61:'Ploaie',63:'Ploaie',65:'Ploaie',71:'Ninsoare',73:'Ninsoare',75:'Ninsoare',80:'Averse',81:'Averse',82:'Averse',95:'Furtună',96:'Furtună',99:'Furtună'};

async function fetchWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=45.0997&longitude=24.3693&current=temperature_2m,weathercode&timezone=auto');
    const d = await r.json();
    const temp = Math.round(d.current.temperature_2m);
    const code = d.current.weathercode;
    document.getElementById('wTemp').textContent = `${WI[code]||'🌤️'} ${temp}°C`;
    document.getElementById('wDesc').textContent = (WD[code]||'') + ' · Râmnicu Vâlcea';
  } catch(e) {}
}
fetchWeather(); setInterval(fetchWeather, 600000);

// ── PIN ──────────────────────────────────────────────────
let pinBuf = '';

window.pk = function(d) {
  if (pinBuf.length >= 4) return;
  pinBuf += d;
  for (let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('on', i < pinBuf.length);
  if (pinBuf.length === 4) {
    setTimeout(() => {
      if (pinBuf === PIN) { pinClose(); adminOpen(); }
      else {
        document.getElementById('pinErr').textContent = 'Cod incorect. Încearcă din nou.';
        setTimeout(() => { pinBuf=''; for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.remove('on'); document.getElementById('pinErr').textContent=''; }, 900);
      }
      pinBuf = '';
    }, 150);
  }
};

window.pkDel = function() {
  pinBuf = pinBuf.slice(0,-1);
  for (let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('on', i < pinBuf.length);
};

window.pinClose = function() {
  document.getElementById('pinOverlay').classList.remove('show');
  pinBuf=''; for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.remove('on');
  document.getElementById('pinErr').textContent='';
};

function pinOpen() { document.getElementById('pinOverlay').classList.add('show'); }

// Clock triple-tap
let tapC=0, tapT=null;
window.clockTap = function() {
  tapC++;
  clearTimeout(tapT);
  tapT = setTimeout(()=>tapC=0, 1400);
  if (tapC>=3) { tapC=0; pinOpen(); }
};

// Alt+A shortcut
document.addEventListener('keydown', e => {
  if (e.altKey && e.key==='a') pinOpen();
  if (e.key==='Escape') { pinClose(); adminClose(); }
});

// ── ADMIN ────────────────────────────────────────────────
function adminOpen() {
  const rows = document.getElementById('adminRows');
  rows.innerHTML = '';
  CURRENCIES.forEach(cur => {
    const b = rates[cur.code]?.buy ?? '';
    const s = rates[cur.code]?.sell ?? '';
    const row = document.createElement('div');
    row.className = 'admin-row';
    row.innerHTML = `
      <div class="admin-cur">
        <img class="admin-flag" src="${cur.flag}" alt="${cur.code}">
        ${cur.code} <span style="color:var(--muted);font-size:0.65vw;font-weight:400;margin-left:0.3vw">${cur.name}</span>
      </div>
      <input class="admin-input" type="number" step="0.0001" id="ab-${cur.code}" value="${b}">
      <input class="admin-input" type="number" step="0.0001" id="as-${cur.code}" value="${s}">
    `;
    rows.appendChild(row);
  });
  document.getElementById('adminOverlay').classList.add('show');
}

window.adminClose = function() {
  document.getElementById('adminOverlay').classList.remove('show');
};

window.adminSave = async function() {
  const btn = document.getElementById('adminSaveBtn');
  const msg = document.getElementById('adminMsg');
  btn.disabled=true; btn.textContent='⏳ Se salvează...';
  const newRates = {};
  CURRENCIES.forEach(cur => {
    newRates[cur.code] = {
      buy:  parseFloat(document.getElementById('ab-'+cur.code).value) || null,
      sell: parseFloat(document.getElementById('as-'+cur.code).value) || null,
    };
  });
  try {
    await saveToFirebase(newRates);
    msg.textContent='✓ Salvat cu succes!'; msg.className='admin-msg ok';
  } catch(e) {
    msg.textContent='✕ Eroare: '+e.message; msg.className='admin-msg err';
  }
  btn.disabled=false; btn.textContent='✓ Salvează Cursurile';
  setTimeout(()=>{ msg.textContent=''; msg.className='admin-msg'; }, 4000);
};

// ── INIT ─────────────────────────────────────────────────
renderCards();
renderTicker();
</script>
</body>
</html>
